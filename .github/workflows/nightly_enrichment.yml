name: Nightly Enrichment

on:
  schedule:
    - cron: "0 7 * * *"  # 7am UTC, after reporium-db sync
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download and start Cloud SQL Auth Proxy
        run: |
          # Mirrors the pattern previously used by nightly_graph_build.yml
          # (pre-Cloud-Run-Job migration, commit 8b02988^). Instance has no
          # public IP, so --private-ip is required.
          PROXY_VERSION="2.11.4"
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v${PROXY_VERSION}/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

          # Start the proxy in background
          ./cloud-sql-proxy "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --private-ip \
            --address 127.0.0.1 \
            --port=5432 \
            --max-connections=5 &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV

          # Wait for proxy to be ready (max 30s)
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432; then
              echo "Cloud SQL Auth Proxy is listening on 127.0.0.1:5432"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Cloud SQL Auth Proxy failed to start"
              exit 1
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 1
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt psycopg2-binary anthropic sentence-transformers httpx
      - name: Fetch commit stats from GitHub
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/fetch_commit_stats.py
      - name: Run enrichment for new repos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os, psycopg2, anthropic, json, sys

          db_url = os.environ['DATABASE_URL']
          api_key = os.environ['ANTHROPIC_API_KEY'].strip()

          conn = psycopg2.connect(db_url)
          cur = conn.cursor()

          # Find repos missing enrichment
          cur.execute(\"SELECT id, name, owner, description, forked_from, primary_language FROM repos WHERE readme_summary IS NULL OR readme_summary = '';\")
          repos = cur.fetchall()

          if not repos:
              print('No repos need enrichment.')
              sys.exit(0)

          print(f'Enriching {len(repos)} new repos...')
          client = anthropic.Anthropic(api_key=api_key)

          for i, (rid, name, owner, desc, forked_from, lang) in enumerate(repos):
              prompt = f'Analyze this GitHub repository and return JSON: {{\"readme_summary\": \"2-3 sentence summary\", \"problem_solved\": \"1 sentence\", \"integration_tags\": [\"list\"]}}\\nRepo: {forked_from or f\"{owner}/{name}\"}\\nDescription: {desc or \"No description\"}\\nLanguage: {lang or \"Unknown\"}\\nReturn ONLY valid JSON.'
              try:
                  resp = client.messages.create(model='claude-sonnet-4-20250514', max_tokens=300, messages=[{'role': 'user', 'content': prompt}])
                  text_out = resp.content[0].text.strip()
                  if text_out.startswith('\`\`\`'): text_out = text_out.split('\\n', 1)[1].rsplit('\`\`\`', 1)[0]
                  data = json.loads(text_out)
                  cur.execute('UPDATE repos SET readme_summary = %s, problem_solved = %s, integration_tags = %s WHERE id = %s;',
                      (data.get('readme_summary',''), data.get('problem_solved',''), json.dumps(data.get('integration_tags',[])), str(rid)))
                  conn.commit()
              except Exception as e:
                  print(f'Error on {owner}/{name}: {e}')
              if (i+1) % 10 == 0:
                  print(f'  Progress: {i+1}/{len(repos)}')

          conn.commit()
          print(f'Done. Enriched {len(repos)} repos.')
          conn.close()
          "

      - name: Cleanup Cloud SQL Auth Proxy
        if: always()
        run: |
          if [ ! -z "$PROXY_PID" ]; then
            kill $PROXY_PID 2>/dev/null || true
            echo "Cloud SQL Auth Proxy stopped"
          fi

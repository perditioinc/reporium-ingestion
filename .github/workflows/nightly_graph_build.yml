name: Nightly Graph Build

on:
  # Run after the nightly enrichment workflow completes
  workflow_run:
    workflows: ["Nightly Enrichment"]
    types: [completed]
  # Also allow manual trigger for on-demand rebuilds
  workflow_dispatch:
    inputs:
      ingest_run_id:
        description: "ingest_runs.id to tag edges with (optional)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-graph:
    runs-on: ubuntu-latest
    # Only run if the triggering enrichment workflow succeeded (or on manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Build knowledge graph edges
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INGEST_RUN_ID: ${{ github.event.inputs.ingest_run_id || '' }}
        run: python scripts/build_knowledge_graph.py

      - name: Report edge counts
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()
          cur.execute("SELECT edge_type, COUNT(*) FROM repo_edges GROUP BY edge_type ORDER BY edge_type;")
          rows = cur.fetchall()
          total = sum(r[1] for r in rows)
          print(f"repo_edges summary (total={total}):")
          for edge_type, count in rows:
              print(f"  {edge_type}: {count}")
          # Alert if DEPENDS_ON is 0 — likely indicates repo_dependencies is empty
          depends_count = next((r[1] for r in rows if r[0] == "DEPENDS_ON"), 0)
          if depends_count == 0:
              print("::warning::DEPENDS_ON edge count is 0 — repo_dependencies may be empty. Run dependency extraction.")
          conn.close()
          EOF

name: Nightly Graph Build

on:
  # 8:30 UTC daily — 90 min after nightly enrichment starts at 07:00 UTC
  schedule:
    - cron: "30 8 * * *"
  # Also allow manual trigger for on-demand rebuilds
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Execute Cloud Run Job (build edges)
        id: graph_job
        run: |
          echo "Triggering reporium-graph-build Cloud Run Job..."
          gcloud run jobs execute reporium-graph-build \
            --project=perditio-platform \
            --region=us-central1 \
            --wait
          echo "Cloud Run Job completed successfully"

      - name: Surface Cloud Run Job diagnostics on failure
        if: failure() && steps.graph_job.outcome == 'failure'
        run: |
          echo "::group::Recent reporium-graph-build executions"
          gcloud run jobs executions list \
            --job=reporium-graph-build \
            --project=perditio-platform \
            --region=us-central1 \
            --limit=3 \
            --format='table(metadata.name,status.startTime,status.completionTime,status.conditions[0].type,status.conditions[0].message)' || true
          echo "::endgroup::"

          LATEST=$(gcloud run jobs executions list \
            --job=reporium-graph-build \
            --project=perditio-platform \
            --region=us-central1 \
            --limit=1 \
            --format='value(metadata.name)' 2>/dev/null || true)
          if [ -n "$LATEST" ]; then
            echo "::group::Execution detail: $LATEST"
            gcloud run jobs executions describe "$LATEST" \
              --project=perditio-platform \
              --region=us-central1 \
              --format=yaml || true
            echo "::endgroup::"

            echo "::group::Last 200 log lines for $LATEST"
            gcloud logging read \
              "resource.type=cloud_run_job AND resource.labels.job_name=reporium-graph-build AND labels.\"run.googleapis.com/execution_name\"=$LATEST" \
              --project=perditio-platform \
              --limit=200 \
              --format='value(timestamp,severity,textPayload)' \
              --order=asc || true
            echo "::endgroup::"
          else
            echo "::warning::Could not resolve latest execution name; showing recent job logs"
            gcloud logging read \
              "resource.type=cloud_run_job AND resource.labels.job_name=reporium-graph-build" \
              --project=perditio-platform \
              --limit=200 \
              --format='value(timestamp,severity,textPayload)' \
              --order=asc || true
          fi

      - name: Check Secret Manager rotation drift (inline RCA hint)
        if: failure() && steps.graph_job.outcome == 'failure'
        run: |
          # Targets the carried-forward RCA: post-2026-04-22 Cloud SQL postgres
          # password rotation drift between reporium-db-url and reporium-db-url-async.
          # Works without roles/logging.viewer; needs roles/secretmanager.viewer.
          # If the CI SA also lacks that, the step surfaces it as a second IAM gap.
          echo "::group::Secret Manager rotation comparison"
          MAIN_OUT=$(gcloud secrets versions list reporium-db-url \
            --project=perditio-platform \
            --filter='state=ENABLED' \
            --sort-by=~createTime --limit=1 \
            --format='value(createTime)' 2>&1) || true
          ASYNC_OUT=$(gcloud secrets versions list reporium-db-url-async \
            --project=perditio-platform \
            --filter='state=ENABLED' \
            --sort-by=~createTime --limit=1 \
            --format='value(createTime)' 2>&1) || true
          echo "reporium-db-url       latest enabled createTime: ${MAIN_OUT:-(no output)}"
          echo "reporium-db-url-async latest enabled createTime: ${ASYNC_OUT:-(no output)}"
          RUNBOOK="https://github.com/perditioinc/reporium-ingestion/blob/main/.audit/2026-04-26/graph-build-followup-jira.md"
          if printf '%s\n%s\n' "$MAIN_OUT" "$ASYNC_OUT" | grep -qiE 'permission_denied|forbidden'; then
            echo "::warning::Secret Manager metadata read denied for CI SA. To enable inline rotation-drift detection, grant roles/secretmanager.viewer to reporium-ingestion-ci@perditio-platform.iam.gserviceaccount.com. See runbook: ${RUNBOOK}"
          elif [ -n "$MAIN_OUT" ] && [ -n "$ASYNC_OUT" ] && [ "$ASYNC_OUT" \> "$MAIN_OUT" ]; then
            echo "::error::SECRET ROTATION DRIFT DETECTED — reporium-db-url-async (${ASYNC_OUT}) is newer than reporium-db-url (${MAIN_OUT}). Most likely root cause: graph-build secret was not rotated after the Cloud SQL postgres password change. Operator runbook: ${RUNBOOK}"
          elif [ -n "$MAIN_OUT" ] && [ -n "$ASYNC_OUT" ]; then
            echo "::notice::Secret rotation drift NOT confirmed by metadata comparison (reporium-db-url is at least as recent as reporium-db-url-async). Cause may be different — see runbook: ${RUNBOOK}"
          else
            echo "::warning::Secret Manager metadata comparison inconclusive (empty output). See runbook: ${RUNBOOK}"
          fi
          echo "::endgroup::"

      - name: Trigger graph snapshot rebuild via reporium-api admin endpoint
        env:
          ADMIN_API_KEY: ${{ secrets.REPORIUM_ADMIN_API_KEY }}
          API_URL: https://reporium-api-wypbzj5gpa-uc.a.run.app
        run: |
          echo "Triggering /admin/graph/rebuild-snapshot ..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${API_URL}/admin/graph/rebuild-snapshot" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}" \
            -H "Content-Length: 0" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Graph snapshot rebuild failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "$BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(f\"Snapshot rebuilt: {d.get('nodes')} nodes, {d.get('similarity_edges')} sim edges, {d.get('typed_edges')} typed edges\")
          print(f\"Typed edge breakdown: {d.get('typed_edge_breakdown')}\")
          print(f\"Size: {d.get('size_kb')} KB\")
          nodes = d.get('nodes', 0)
          if nodes < 1500:
              print(f'::warning::Node count {nodes} is below 1500 — enrichment may be incomplete')
          typed = d.get('typed_edges', 0)
          if typed < 50:
              print(f'::warning::Typed edge count {typed} is low — repo_dependencies may need backfill')
          if d.get('typed_edge_breakdown', {}).get('ALTERNATIVE_TO', 0) == 0:
              print(f'::warning::ALTERNATIVE_TO edge count is 0')
          if d.get('typed_edge_breakdown', {}).get('COMPATIBLE_WITH', 0) == 0:
              print(f'::warning::COMPATIBLE_WITH edge count is 0')
          "

      - name: Verify graph endpoint returns fresh data
        env:
          API_URL: https://reporium-api-wypbzj5gpa-uc.a.run.app
        run: |
          echo "Verifying /graph/edges returns updated data..."
          RESPONSE=$(curl -s "${API_URL}/graph/edges?limit=100")
          TOTAL=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('total_public_repos', 0))")
          EDGE_TYPES=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('edgeTypes', []))")
          echo "total_public_repos: $TOTAL"
          echo "edge_types: $EDGE_TYPES"
          if [ "$TOTAL" -lt 1500 ]; then
            echo "::warning::total_public_repos=$TOTAL is below 1500"
          fi

name: Nightly Graph Build

on:
  # 8:30 UTC daily — 90 min after nightly enrichment starts at 07:00 UTC
  schedule:
    - cron: "30 8 * * *"
  # Also allow manual trigger for on-demand rebuilds
  workflow_dispatch:
    inputs:
      ingest_run_id:
        description: "ingest_runs.id to tag edges with (optional)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-graph:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download and start Cloud SQL Auth Proxy
        run: |
          # Download cloud-sql-proxy v2.x
          PROXY_VERSION="2.11.4"
          curl -o cloud-sql-proxy https://dl.google.com/cloudsql/cloud-sql-proxy.linux.amd64.v${PROXY_VERSION}
          chmod +x cloud-sql-proxy

          # Start the proxy in background
          ./cloud-sql-proxy "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --private-ip \
            --port=5432 \
            --max-connections=5 &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV

          # Wait for proxy to be ready (max 30s)
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432; then
              echo "Cloud SQL Auth Proxy is listening on 127.0.0.1:5432"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Cloud SQL Auth Proxy failed to start"
              exit 1
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 1
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build knowledge graph edges (ALTERNATIVE_TO, COMPATIBLE_WITH, DEPENDS_ON)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INGEST_RUN_ID: ${{ github.event.inputs.ingest_run_id || '' }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/build_knowledge_graph.py

      - name: Trigger graph snapshot rebuild via reporium-api admin endpoint
        env:
          ADMIN_API_KEY: ${{ secrets.REPORIUM_ADMIN_API_KEY }}
          API_URL: https://reporium-api-wypbzj5gpa-uc.a.run.app
        run: |
          echo "Triggering /admin/graph/rebuild-snapshot ..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${API_URL}/admin/graph/rebuild-snapshot" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}" \
            -H "Content-Length: 0" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Graph snapshot rebuild failed with HTTP $HTTP_CODE"
            exit 1
          fi
          # Parse and log stats from response
          echo "$BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(f\"Snapshot rebuilt: {d.get('nodes')} nodes, {d.get('similarity_edges')} sim edges, {d.get('typed_edges')} typed edges\")
          print(f\"Typed edge breakdown: {d.get('typed_edge_breakdown')}\")
          print(f\"Size: {d.get('size_kb')} KB\")
          nodes = d.get('nodes', 0)
          if nodes < 1500:
              print(f'::warning::Node count {nodes} is below 1500 — enrichment may be incomplete')
          typed = d.get('typed_edges', 0)
          if typed < 50:
              print(f'::warning::Typed edge count {typed} is low — repo_dependencies may need backfill')
          if d.get('typed_edge_breakdown', {}).get('ALTERNATIVE_TO', 0) == 0:
              print(f'::warning::ALTERNATIVE_TO edge count is 0')
          if d.get('typed_edge_breakdown', {}).get('COMPATIBLE_WITH', 0) == 0:
              print(f'::warning::COMPATIBLE_WITH edge count is 0')
          "

      - name: Verify graph endpoint returns fresh data
        env:
          API_URL: https://reporium-api-wypbzj5gpa-uc.a.run.app
        run: |
          echo "Verifying /graph/edges returns updated data..."
          RESPONSE=$(curl -s "${API_URL}/graph/edges?limit=100")
          TOTAL=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('total_public_repos', 0))")
          EDGE_TYPES=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('edgeTypes', []))")
          echo "total_public_repos: $TOTAL"
          echo "edge_types: $EDGE_TYPES"
          if [ "$TOTAL" -lt 1500 ]; then
            echo "::warning::total_public_repos=$TOTAL is below 1500"
          fi

      - name: Cleanup Cloud SQL Auth Proxy
        if: always()
        run: |
          if [ ! -z "$PROXY_PID" ]; then
            kill $PROXY_PID 2>/dev/null || true
            echo "Cloud SQL Auth Proxy stopped"
          fi

name: Manual Ingestion Run

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (quick / weekly / full)"
        type: choice
        options:
          - weekly
          - full
          - quick
        default: weekly
      fix_repos:
        description: "Comma-separated repo names to re-ingest (leave blank for all)"
        required: false
        default: ""
  schedule:
    # Weekly cadence to keep trend_snapshots populated. Mondays 09:00 UTC.
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # full mode can take up to 3 hours for 1,460 repos

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          REPORIUM_API_URL: ${{ secrets.REPORIUM_API_URL }}
          # ReporiumAPIClient reads REPORIUM_API_KEY (Bearer) and INGEST_API_KEY (X-Ingest-Key).
          # After reporium-api PR #182, /ingest/* returns 403 without X-Ingest-Key.
          REPORIUM_API_KEY: ${{ secrets.REPORIUM_API_KEY }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          # Preserved in case legacy code paths still read it.
          INGESTION_API_KEY: ${{ secrets.INGESTION_API_KEY }}
          # KAN-200: README fallback summarizer floor must match the
          # KAN-191 probe's PROBE_SUMMARY_MIN_CHARS (default 50). Set
          # explicitly here so the writer's floor is visible alongside the
          # job, and so a future bump only needs touching this value plus
          # the probe config in reporium-api.
          PROBE_SUMMARY_MIN_CHARS: "50"
        run: |
          # Schedule-triggered runs have no `inputs.mode`; default to weekly.
          MODE="${{ inputs.mode || 'weekly' }}"
          FIX_REPOS="${{ inputs.fix_repos }}"

          if [ -n "$FIX_REPOS" ]; then
            echo "Running fix mode for repos: $FIX_REPOS"
            # NB: `fix` is its own CLI subcommand (main.py:506). The previous
            # form `run --mode fix --repos ...` silently dropped --repos because
            # the `run` branch only parses --mode, so every fix-mode dispatch
            # was degenerating into a full 1852-repo scan and hanging.
            python -m ingestion fix --repos "$FIX_REPOS"
          else
            echo "Running ingestion in $MODE mode for all repos"
            python -m ingestion run --mode "$MODE"
          fi

name: Manual Ingestion Run

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (quick / weekly / full)"
        type: choice
        options:
          - weekly
          - full
          - quick
        default: weekly
      fix_repos:
        description: "Comma-separated repo names to re-ingest (leave blank for all)"
        required: false
        default: ""
  schedule:
    # Weekly cadence to keep trend_snapshots populated. Mondays 09:00 UTC.
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # full mode can take up to 3 hours for 1,460 repos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          REPORIUM_API_URL: ${{ secrets.REPORIUM_API_URL }}
          # ReporiumAPIClient reads REPORIUM_API_KEY (Bearer) and INGEST_API_KEY (X-Ingest-Key).
          # After reporium-api PR #182, /ingest/* returns 403 without X-Ingest-Key.
          REPORIUM_API_KEY: ${{ secrets.REPORIUM_API_KEY }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          # Preserved in case legacy code paths still read it.
          INGESTION_API_KEY: ${{ secrets.INGESTION_API_KEY }}
        run: |
          # Schedule-triggered runs have no `inputs.mode`; default to weekly.
          MODE="${{ inputs.mode || 'weekly' }}"
          FIX_REPOS="${{ inputs.fix_repos }}"

          if [ -n "$FIX_REPOS" ]; then
            echo "Running fix mode for repos: $FIX_REPOS"
            python -m ingestion run --mode fix --repos "$FIX_REPOS"
          else
            echo "Running ingestion in $MODE mode for all repos"
            python -m ingestion run --mode "$MODE"
          fi

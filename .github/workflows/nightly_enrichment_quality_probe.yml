name: Nightly Enrichment Quality Probe

# KAN-191 — closes the "deepest unknown" surfaced by the 4h audit: there was
# zero gate on what the nightly Anthropic enrichment writes into
# repos.primary_category / repos.integration_tags / repos.readme_summary.
#
# KAN-192 — re-wires the probe to call the reporium-api admin endpoint
# /admin/enrichment/quality-probe instead of running the Python module
# directly. Why: the original direct-DB approach failed in GitHub Actions
# because DATABASE_URL points at a Cloud SQL Unix socket only mounted in
# GCP runtimes. The admin endpoint runs in-VPC where DATABASE_URL works,
# mirroring the established /admin/graph/rebuild-snapshot pattern used by
# nightly_graph_build.yml.
#
# The Cloud Run Job `reporium-ingestion-nightly` runs at 03:00 UTC (see
# deploy/scheduler.yaml) and typically finishes within ~60 min.
# This workflow runs at 05:00 UTC — well after enrichment completes,
# but before the 08:30 UTC graph build picks up potentially-broken data.
#
# Non-zero exit fails the workflow → the same Workato → JIRA notify-on-failure
# pipeline that fires for graph-build failures (KAN-147 pattern) handles
# alerting. No new alerting plumbing required.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run enrichment quality probe via admin endpoint
        env:
          API_URL: ${{ secrets.REPORIUM_API_URL }}
          ADMIN_API_KEY: ${{ secrets.REPORIUM_ADMIN_API_KEY }}
        run: |
          set -o pipefail
          if [ -z "${API_URL}" ]; then
            echo "::error::REPORIUM_API_URL secret is not set"
            exit 1
          fi
          if [ -z "${ADMIN_API_KEY}" ]; then
            echo "::error::REPORIUM_ADMIN_API_KEY secret is not set"
            exit 1
          fi

          response=$(curl -sS -X POST "${API_URL}/admin/enrichment/quality-probe" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}" \
            -H "Content-Length: 0" \
            -w "\n%{http_code}" \
            --max-time 120)
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)

          echo "::group::Probe response (HTTP $code)"
          echo "$body" | jq . || echo "$body"
          echo "::endgroup::"

          # 200 = all checks passed; 422 = at least one check failed
          # (body still contains the full report under .detail).
          # Any other code is an unexpected failure (network, auth, 5xx).
          if [ "$code" = "200" ]; then
            echo "Probe PASSED"
            exit 0
          fi

          if [ "$code" = "422" ]; then
            echo "::error::Enrichment quality probe FAILED — see report above"
            # Surface the per-check failures inline for fast triage.
            echo "$body" | jq -r '.detail.checks[] | select(.passed == false) | "::error::\(.name): \(.observed) — floor: \(.floor)"' || true
            exit 1
          fi

          echo "::error::Probe call returned unexpected HTTP $code"
          exit 1

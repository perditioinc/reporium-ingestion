apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: reporium-ingestion-nightly
spec:
  template:
    spec:
      template:
        spec:
          maxRetries: 1
          timeoutSeconds: 3600
          containers:
            - image: gcr.io/PROJECT_ID/reporium-ingestion:latest
              command:
                - python
                - -m
                - ingestion
                - run
                - --mode
                - quick
              resources:
                limits:
                  cpu: "1"
                  memory: 512Mi
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: GITHUB_TOKEN
                      key: latest
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: anthropic-api-key
                      key: latest
                - name: REPORIUM_API_URL
                  valueFrom:
                    secretKeyRef:
                      name: REPORIUM_API_URL
                      key: latest
                - name: REPORIUM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: REPORIUM_API_KEY
                      key: latest
                - name: INGEST_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: INGEST_API_KEY
                      key: latest
                # KAN-200: keep the README fallback summarizer's floor in
                # lock-step with the KAN-191 probe's PROBE_SUMMARY_MIN_CHARS.
                # Override here ONLY if you are also overriding the probe
                # config in reporium-api — otherwise leave unset and both
                # sides will default to 50.
                - name: PROBE_SUMMARY_MIN_CHARS
                  value: "50"
